<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GitHub Issues Tracker</title>

  <!-- Tailwind & daisyUI -->
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

  <!-- fav icon -->
  <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">

</head>

<body class="font-style bg-[#F8FAFC]">


  <header>
    <nav class="flex justify-between p-5 bg-white shadow">
      <div class="flex justify-between gap-2">
        <img src="./assets/github-logo.png" alt="" class="w-10">
        <p class="text-center text-[#1F2937] font-bold text-3xl mb-2">GitHub Issues Tracker</p>
      </div>
      <div class="flex justify-between gap-4">
        <input type="text" placeholder="Search issues..." class="input" />
        <button class="btn btn-primary"> + New Issue</button>
      </div>
    </nav>
  </header>


  <script src="./script/login.js"></script>
</body>

</html>
