<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GitHub Issues Tracker</title>

  <!-- Tailwind & daisyUI -->
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

  <!-- fav icon -->
  <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">

</head>

<body class="font-style bg-[#F8FAFC]">

  <!-- header -->

  <header class="mb-14">
    <nav class="flex justify-between p-5 bg-white shadow">
      <div class="flex justify-between gap-2">
        <img src="./assets/github-logo.png" alt="" class="w-10">
        <p class="text-center text-[#1F2937] font-bold text-3xl mb-2">GitHub Issues Tracker</p>
      </div>
      <div class="flex justify-between gap-4">
        <input type="text" placeholder="Search issues..." class="input" />
        <button class="btn btn-primary"> + New Issue</button>
      </div>
    </nav>
  </header>

  <!-- main -->

  <main class="max-w-6xl mx-auto">

    <!-- tabs -->
    <div id="tabs-container" class="flex p-4 gap-2 mb-6 shadow-md rounded-md bg-white">
      <button class="btn btn-primary">All</button>
      <button class="btn btn-outline">Open</button>
      <button class="btn btn-outline">Closed</button>
    </div>

    <!-- summary -->
    <div id="issue-summary" class="flex justify-between p-6 shadow bg-white items-center">
      <div class="leftdiv flex items-center gap-3">
        <img src="./assets/Aperture.png" alt="" class="w-[50px]">
        <div>
          <h4 class="font-bold text-xl">50 Issues</h4>
          <p class="text-[#64748B]">Track and manage your project issues</p>
        </div>
      </div>

      <div class="rightdiv flex gap-2">
        <p class="font-medium">Open</p>
        <p class="font-medium">Closed</p>
      </div>
    </div>

    <!-- card -->

    <div id="issue-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 mt-6 gap-4">
